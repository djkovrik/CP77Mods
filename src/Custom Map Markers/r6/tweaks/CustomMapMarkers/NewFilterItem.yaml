Mappins.CustomMapMarkersVariant:
  $type: gamedataMappinVariant_Record
  enumName: CPO_PingGoHereVariant

WorldMap.CustomMapMarkersFilter:
  $type: gamedataWorldMapFilter_Record
  enumName: CustomFilter

WorldMap.CustomMapMarkersFilterGroup:
  $type: gamedataMappinUIFilterGroup_Record
  filterName: CustomMarkers-FilterName
  filterType: WorldMap.CustomMapMarkersFilter
  mappins:
    - Mappins.CustomMapMarkersVariant
  shouldCollectMappins: False

WorldMap.WorldMapQuickFiltersList.list:
  - !append-once WorldMap.CustomMapMarkersFilterGroup

WorldMap.WorldMapCustomFiltersList.list:
  - !append-once WorldMap.CustomMapMarkersFilterGroup

Mappins.CustomMapMarkersMappinDefinition:
  $type: gamedataMappinDefinition_Record
  showInWorld: True
  showOnMap: True
  showOnMinimap: True
  visibilityRange: 0
  possibleVariants:
    - Mappins.CustomMapMarkersVariant

WorldMappinUIProfile.CustomMapMarkers:
  $base: WorldMappinUIProfile.Quest

MinimapMappinUIProfile.CustomMapMarkers:
  $base: MinimapMappinUIProfile.Quest

WorldMap.QuestFilterGroup.mappins:
  - !append-once Mappins.CustomMapMarkersVariant
